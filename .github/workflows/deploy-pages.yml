name: Deploy Next.js static export to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ vars.NEXT_PUBLIC_ADMIN_EMAILS }}
          NEXT_PUBLIC_PULSE_PLAYERS: ${{ vars.NEXT_PUBLIC_PULSE_PLAYERS }}
          NEXT_PUBLIC_PULSOID_CLIENT_ID: ${{ vars.NEXT_PUBLIC_PULSOID_CLIENT_ID }}
          NEXT_PUBLIC_PULSOID_REDIRECT_URI: ${{ vars.NEXT_PUBLIC_PULSOID_REDIRECT_URI }}
          NEXT_PUBLIC_PULSOID_SCOPES: ${{ vars.NEXT_PUBLIC_PULSOID_SCOPES }}
          NEXT_PUBLIC_PULSOID_HEART_RATE_ENDPOINT: ${{ vars.NEXT_PUBLIC_PULSOID_HEART_RATE_ENDPOINT }}
          NEXT_PUBLIC_PULSOID_PLAYER_ID: ${{ vars.NEXT_PUBLIC_PULSOID_PLAYER_ID }}
          NEXT_PUBLIC_PULSOID_PLAYER_NAME: ${{ vars.NEXT_PUBLIC_PULSOID_PLAYER_NAME }}
          NEXT_PUBLIC_PULSOID_VALUE_PATH: ${{ vars.NEXT_PUBLIC_PULSOID_VALUE_PATH }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
